<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Item Not Found</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
  <style>
    /* ========== CSS Variables (Matching show-items.css & add-item.css) ========== */
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --danger-color: #dc2626;
      --danger-hover: #b91c1c;
      --bg-color: #f1f5f9;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 8px;
      --transition: all 0.2s ease-in-out;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.6;
    }

    /* ========== Main Container ========== */
    .container {
      max-width: 500px;
      width: 100%;
      background: var(--card-bg);
      padding: 60px 45px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--danger-color), #f87171);
    }

    /* ========== Error Code ========== */
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--danger-color) 0%, #f87171 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }

    /* ========== Error Icon ========== */
    .error-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 25px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--danger-color);
      border: 2px solid #fecaca;
    }

    /* ========== Title ========== */
    .text {
      color: var(--text-primary);
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    /* ========== Description ========== */
    .description {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    /* ========== Back Button ========== */
    .back-button {
      display: inline-block;
      padding: 14px 32px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-md);
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
    }

    .back-button:active {
      transform: translateY(0);
    }

    /* ========== Home Link ========== */
    .home-link {
      margin-top: 25px;
    }

    .home-link a {
      display: inline-block;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      position: relative;
      padding-bottom: 3px;
      transition: var(--transition);
    }

    .home-link a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary-color), #60a5fa);
      transition: width 0.3s ease;
    }

    .home-link a:hover {
      color: var(--primary-color);
    }

    .home-link a:hover::after {
      width: 100%;
    }

    /* ========== Responsive Design ========== */
    @media screen and (max-width: 768px) {
      .container {
        padding: 45px 30px;
      }

      .error-code {
        font-size: 6rem;
      }

      .text {
        font-size: 1.5rem;
      }

      .error-icon {
        width: 70px;
        height: 70px;
        font-size: 35px;
      }
    }

    @media screen and (max-width: 480px) {
      .error-code {
        font-size: 5rem;
      }

      .text {
        font-size: 1.25rem;
      }

      .back-button {
        width: 100%;
        padding: 14px 0;
      }
    }

    /* ========== Animations ========== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .container {
      animation: fadeIn 0.4s ease-out forwards;
    }

    .error-icon {
      animation: shake 0.5s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-icon">!</div>
    <div class="error-code">404</div>
    <div class="text">Item Not Found</div>
    <p class="description">
      The item you are looking for does not exist or may have been removed.<br>
      Please check the ID and try again.
    </p>
    <a href="/item-service-mvc-project/itemController" class="back-button">Back To Items</a>
    <p class="home-link">
      <a href="/item-service-mvc-project/itemController">Go to Home</a>
    </p>
  </div>
</body>
</html>
