<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Error</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ========== CSS Variables (Matching show-items.css) ========== */
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --warning-color: #f59e0b;
      --warning-hover: #d97706;
      --danger-color: #dc2626;
      --bg-color: #f1f5f9;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 8px;
      --transition: all 0.2s ease-in-out;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.6;
    }

    /* ========== Main Container ========== */
    .container {
      max-width: 500px;
      width: 100%;
      background: var(--card-bg);
      padding: 60px 45px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--warning-color), #fbbf24);
    }

    /* ========== Error Icon ========== */
    .error-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 25px;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--warning-color);
      border: 3px solid #fcd34d;
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ========== Error Code ========== */
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--warning-color) 0%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }

    /* ========== Title ========== */
    .text {
      color: var(--text-primary);
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    /* ========== Description ========== */
    .description {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    /* ========== Action Buttons ========== */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .back-button {
      display: inline-block;
      padding: 14px 32px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 280px;
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
    }

    .back-button:active {
      transform: translateY(0);
    }

    .retry-button {
      display: inline-block;
      padding: 12px 28px;
      border: 2px solid var(--warning-color);
      border-radius: var(--radius);
      background: transparent;
      color: var(--warning-color);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
      max-width: 280px;
    }

    .retry-button:hover {
      background: var(--warning-color);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    /* ========== Home Link ========== */
    .home-link {
      margin-top: 25px;
    }

    .home-link a {
      display: inline-block;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      position: relative;
      padding-bottom: 3px;
      transition: var(--transition);
    }

    .home-link a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary-color), #60a5fa);
      transition: width 0.3s ease;
    }

    .home-link a:hover {
      color: var(--primary-color);
    }

    .home-link a:hover::after {
      width: 100%;
    }

    /* ========== Responsive Design ========== */
    @media screen and (max-width: 768px) {
      .container {
        padding: 45px 30px;
      }

      .error-code {
        font-size: 5rem;
      }

      .text {
        font-size: 1.5rem;
      }

      .error-icon {
        width: 75px;
        height: 75px;
        font-size: 35px;
      }
    }

    @media screen and (max-width: 480px) {
      .error-code {
        font-size: 4rem;
      }

      .text {
        font-size: 1.25rem;
      }

      .back-button,
      .retry-button {
        width: 100%;
        padding: 14px 0;
      }
    }

    /* ========== Animations ========== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.2);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 15px 35px rgba(245, 158, 11, 0.3);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .container {
      animation: fadeIn 0.4s ease-out forwards;
    }

    .error-icon i {
      animation: shake 0.5s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-icon">
      <i class="fas fa-user-slash"></i>
    </div>
    <div class="error-code">401</div>
    <div class="text">User Access Denied</div>
    <p class="description">
      Your account may be unauthorized, disabled, or not found in our system.<br>
      Please check your credentials or contact support.
    </p>
    <div class="actions">
      <a href="/item-service-mvc-project/LoginController" class="back-button">Back To Login</a>
      <a href="/item-service-mvc-project/LoginController" class="retry-button">Try Again</a>
    </div>
    
  </div>
</body>
</html>
